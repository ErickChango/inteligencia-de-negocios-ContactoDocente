services:
  # Base de Datos MySQL - Base de Operaciones (OLTP) 
  mysql_operaciones:
    image: mysql:8.4
    platform: linux/amd64
    container_name: papermart_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: operaciones
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
    networks:
      - papermart_network
    restart: unless-stopped

  # Base de Datos PostgreSQL - Base de Gestión 
  postgres_gestion:
    image: postgres:15
    platform: linux/amd64
    container_name: papermart_postgres
    environment:
      POSTGRES_DB: gestion
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d
    networks:
      - papermart_network
    restart: unless-stopped

networks:
  papermart_network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
